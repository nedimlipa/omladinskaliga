<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijava | ORL Sjever</title>
  <script>
    (function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.classList.toggle('dark',t==='dark');})();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','system-ui','sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;}</style>
</head>

<body class="min-h-screen bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased flex items-center justify-center px-4 py-10">

  <!-- Theme toggle -->
  <button id="themeToggle" type="button" title="Promijeni temu"
    class="fixed top-4 right-4 p-2 rounded-lg text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-800 shadow-sm transition">
    <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M5.64 18.36l-.71.71M18.36 18.36l-.71-.71M5.64 5.64l-.71-.71M12 8a4 4 0 100 8 4 4 0 000-8z"/>
    </svg>
    <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>

  <div class="w-full max-w-md">

    <!-- Brand -->
    <a href="/" class="flex items-center justify-center gap-3 mb-8 group">
      <div class="w-11 h-11 bg-red-600 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-red-600/30 group-hover:shadow-red-600/50 transition">
        &#127942;
      </div>
      <span class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-white">ORL Sjever</span>
    </a>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 p-8 space-y-6">

      <div>
        <h1 class="text-xl font-extrabold text-gray-900 dark:text-white mb-1">Prijavite se</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Unesite kredencijale za pristup platformi</p>
      </div>

      {% if error %}
      <div class="flex items-center gap-2.5 p-3.5 text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700/50 rounded-xl">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label for="username" class="block mb-1.5 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
            Korisničko ime
          </label>
          <input id="username" type="text" name="username" required autocomplete="username"
            placeholder="Unesite username"
            class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-xl px-4 py-3 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"/>
        </div>

        <div>
          <label for="password" class="block mb-1.5 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
            Lozinka
          </label>
          <input id="password" type="password" name="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-xl px-4 py-3 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"/>
        </div>

        <button type="submit"
          class="w-full bg-red-600 hover:bg-red-700 active:scale-[.98] text-white font-bold rounded-xl px-5 py-3 text-sm shadow-sm shadow-red-600/30 transition-all focus:outline-none focus:ring-4 focus:ring-red-500/30">
          Prijavite se &rarr;
        </button>
      </form>

    </div>

    <p class="text-center text-xs text-gray-400 dark:text-gray-600 mt-6">
      Omladinska Rukometna Liga Sjever &copy; 2026
    </p>
  </div>

  <script>
    const html=document.documentElement;
    const iconSun=document.getElementById('iconSun');
    const iconMoon=document.getElementById('iconMoon');

    function syncIcons(){
      const dark=html.classList.contains('dark');
      iconSun.classList.toggle('hidden',!dark);
      iconMoon.classList.toggle('hidden',dark);
    }
    syncIcons();

    document.getElementById('themeToggle').addEventListener('click',()=>{
      const dark=html.classList.toggle('dark');
      localStorage.setItem('theme',dark?'dark':'light');
      syncIcons();
    });
  </script>
</body>
</html>
